name: Release JAR

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build release JAR
        working-directory: java-app
        run: |
          chmod +x ./gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew clean releaseJar -PappVersion="${VERSION}"
          shasum -a 256 "dist/hello-brew-${VERSION}.jar" > "dist/hello-brew-${VERSION}.jar.sha256"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            java-app/dist/hello-brew-*.jar
            java-app/dist/hello-brew-*.jar.sha256
